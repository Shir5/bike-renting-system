spring.application.name=bike-renting-backend
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/bike_renting}
spring.datasource.username=${DATABASE_USERNAME:bike_renting}
spring.datasource.password=${DATABASE_PASSWORD:bike_renting}

spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.generate-ddl=true
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET:eDNERjdHbUNrWE5aV1BIZkxKMnNBWUhCeE11Slg1ZnRFejc5WXJUcWhLQU5YSkJzQ25EU2FZS2JGdTI5TjhMVDN2}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*}

logging.level.org.springframework=${SPRING_LOG_LEVEL:INFO}
logging.level.org.springframework.transaction=${TRANSACTION_LOG_LEVEL:INFO}

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
