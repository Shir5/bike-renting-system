name: Feature request
description: Propose an improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or developer problem should be solved?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe behavior, API changes and alternatives considered.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and risks
      description: Which client, backend, data or deployment areas are affected?
