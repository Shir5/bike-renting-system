name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Please remove secrets and personal data from logs and screenshots.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the actual and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: "1. Start ...\n2. Open ...\n3. Observe ..."
    validations:
      required: true
  - type: input
    id: revision
    attributes:
      label: Revision
      description: Commit SHA or branch name.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, device/emulator, Node, Java, Docker and browser versions as relevant.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      render: shell
